server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' https://www.googletagmanager.com https://challenges.cloudflare.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://admin.webfuengirola.com https://challenges.cloudflare.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://challenges.cloudflare.com; form-action 'self' https://admin.webfuengirola.com; upgrade-insecure-requests" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), browsing-topics=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()" always;

  location ~ /\.(?!well-known) {
    deny all;
  }

  location = /index.html {
    return 301 /;
  }

  location = /servicios.html {
    return 301 /servicios/;
  }

  location = /portfolio.html {
    return 301 /casos/;
  }

  location = /proceso.html {
    return 301 /como-trabajamos/;
  }

  location = /diseno-web-fuengirola.html {
    return 301 /servicios/diseno-web/;
  }

  location = /diseno-web-mijas.html {
    return 301 /servicios/diseno-web/;
  }

  location = /diseno-web-benalmadena.html {
    return 301 /servicios/diseno-web/;
  }

  location = /diseno-web-marbella.html {
    return 301 /servicios/diseno-web/;
  }

  location = /seo-local-fuengirola.html {
    return 301 /servicios/seo-local/;
  }

  location / {
    try_files $uri $uri/ $uri.html =404;
  }
}
