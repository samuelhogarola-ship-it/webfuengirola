name: Studio Panel CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/studio-panel/**'
      - 'supabase/migrations/**'
      - '.github/workflows/studio-panel-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/studio-panel/**'
      - 'supabase/migrations/**'
      - '.github/workflows/studio-panel-ci.yml'

defaults:
  run:
    working-directory: apps/studio-panel

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/studio-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
