<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f3f3f3"/>

  <!-- Laptop body -->
  <rect x="180" y="200" width="300" height="200" rx="12" fill="#ffffff" stroke="#e0e0e4" stroke-width="2"/>
  <rect x="200" y="218" width="260" height="150" rx="6" fill="#0a0a0a"/>
  <!-- Laptop keyboard base -->
  <rect x="140" y="400" width="380" height="24" rx="8" fill="#e8e8ec" stroke="#d0d0d4" stroke-width="1.5"/>
  <rect x="310" y="400" width="40" height="12" rx="4" fill="#d0d0d4"/>

  <!-- Code lines on laptop screen -->
  <rect x="216" y="234" width="80" height="6" rx="3" fill="#b0b0b6" opacity=".7"/>
  <rect x="216" y="248" width="120" height="6" rx="3" fill="#6e6e76" opacity=".5"/>
  <rect x="230" y="262" width="90" height="6" rx="3" fill="#b0b0b6" opacity=".6"/>
  <rect x="230" y="276" width="60" height="6" rx="3" fill="#6e6e76" opacity=".4"/>
  <rect x="216" y="290" width="100" height="6" rx="3" fill="#b0b0b6" opacity=".5"/>
  <rect x="230" y="304" width="70" height="6" rx="3" fill="#6e6e76" opacity=".4"/>
  <rect x="216" y="318" width="110" height="6" rx="3" fill="#b0b0b6" opacity=".6"/>
  <rect x="216" y="332" width="50" height="6" rx="3" fill="#6e6e76" opacity=".3"/>

  <!-- Phone -->
  <rect x="540" y="220" width="100" height="180" rx="18" fill="#ffffff" stroke="#e0e0e4" stroke-width="2"/>
  <rect x="554" y="238" width="72" height="124" rx="6" fill="#0a0a0a"/>
  <!-- Phone notch -->
  <rect x="578" y="224" width="24" height="6" rx="3" fill="#d0d0d4"/>
  <!-- Phone home bar -->
  <rect x="568" y="390" width="44" height="5" rx="2.5" fill="#d0d0d4"/>
  <!-- Phone screen content -->
  <rect x="562" y="250" width="56" height="6" rx="3" fill="#b0b0b6" opacity=".7"/>
  <rect x="562" y="264" width="40" height="6" rx="3" fill="#6e6e76" opacity=".4"/>
  <!-- Chat bubble on phone -->
  <rect x="562" y="284" width="48" height="22" rx="8" fill="#b0b0b6" opacity=".3"/>
  <rect x="570" y="316" width="40" height="22" rx="8" fill="#0a0a0a" opacity=".6"/>

  <!-- Robot / AI head -->
  <circle cx="490" cy="140" r="52" fill="#ffffff" stroke="#e0e0e4" stroke-width="2"/>
  <!-- Robot eyes -->
  <circle cx="474" cy="132" r="10" fill="#0a0a0a"/>
  <circle cx="506" cy="132" r="10" fill="#0a0a0a"/>
  <circle cx="477" cy="129" r="3" fill="#ffffff"/>
  <circle cx="509" cy="129" r="3" fill="#ffffff"/>
  <!-- Robot mouth -->
  <path d="M474 153 Q490 163 506 153" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Robot antenna -->
  <line x1="490" y1="88" x2="490" y2="72" stroke="#b0b0b6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="490" cy="66" r="7" fill="#b0b0b6"/>
  <!-- Robot ear vents -->
  <rect x="432" y="126" width="6" height="28" rx="3" fill="#e0e0e4"/>
  <rect x="442" y="130" width="4" height="20" rx="2" fill="#e0e0e4"/>
  <rect x="542" y="126" width="6" height="28" rx="3" fill="#e0e0e4"/>
  <rect x="534" y="130" width="4" height="20" rx="2" fill="#e0e0e4"/>

  <!-- Speech / chat bubble -->
  <rect x="536" y="60" width="148" height="60" rx="16" fill="#0a0a0a"/>
  <path d="M556 120 L548 138 L570 120" fill="#0a0a0a"/>
  <rect x="550" y="76" width="112" height="8" rx="4" fill="#ffffff" opacity=".8"/>
  <rect x="550" y="92" width="80" height="8" rx="4" fill="#b0b0b6" opacity=".6"/>

  <!-- Connection lines -->
  <line x1="440" y1="168" x2="390" y2="220" stroke="#e0e0e4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="540" y1="168" x2="558" y2="220" stroke="#e0e0e4" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Small sparkles / stars -->
  <circle cx="160" cy="160" r="4" fill="#b0b0b6" opacity=".4"/>
  <circle cx="148" cy="148" r="2" fill="#b0b0b6" opacity=".3"/>
  <circle cx="172" cy="150" r="3" fill="#b0b0b6" opacity=".3"/>
  <circle cx="660" cy="420" r="4" fill="#b0b0b6" opacity=".4"/>
  <circle cx="648" cy="432" r="2.5" fill="#b0b0b6" opacity=".3"/>
  <circle cx="672" cy="410" r="3" fill="#b0b0b6" opacity=".3"/>
</svg>
