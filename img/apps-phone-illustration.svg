<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f3f3f3"/>

  <!-- Phone frame (centered, tall) -->
  <rect x="264" y="60" width="272" height="480" rx="40" fill="#0a0a0a"/>
  <!-- Screen bezel -->
  <rect x="278" y="90" width="244" height="420" rx="24" fill="#1a1a1a"/>
  <!-- Screen content area -->
  <rect x="284" y="96" width="232" height="408" rx="20" fill="#ffffff"/>
  <!-- Dynamic island / notch -->
  <rect x="352" y="74" width="96" height="22" rx="11" fill="#000000"/>

  <!-- App header bar -->
  <rect x="284" y="96" width="232" height="56" rx="20" fill="#f8f8f8"/>
  <rect x="284" y="132" width="232" height="20" fill="#f8f8f8"/>
  <!-- Header text -->
  <rect x="304" y="113" width="64" height="10" rx="5" fill="#0a0a0a" opacity=".7"/>

  <!-- Vokabellab icon in header -->
  <rect x="476" y="107" width="24" height="24" rx="7" fill="#0a0a0a"/>
  <text x="488" y="123" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">V</text>

  <!-- Word card main -->
  <rect x="300" y="168" width="200" height="120" rx="16" fill="#0a0a0a"/>
  <rect x="316" y="186" width="80" height="10" rx="5" fill="#b0b0b6" opacity=".5"/>
  <rect x="316" y="204" width="140" height="18" rx="6" fill="#ffffff" opacity=".95"/>
  <rect x="316" y="232" width="100" height="10" rx="5" fill="#b0b0b6" opacity=".4"/>
  <rect x="316" y="250" width="60" height="10" rx="5" fill="#b0b0b6" opacity=".3"/>

  <!-- Progress bar -->
  <rect x="300" y="304" width="200" height="8" rx="4" fill="#f0f0f0"/>
  <rect x="300" y="304" width="130" height="8" rx="4" fill="#0a0a0a"/>

  <!-- Action buttons -->
  <rect x="300" y="328" width="92" height="36" rx="10" fill="#f0f0f0"/>
  <rect x="308" y="340" width="60" height="8" rx="4" fill="#b0b0b6"/>
  <rect x="408" y="328" width="92" height="36" rx="10" fill="#0a0a0a"/>
  <rect x="416" y="340" width="60" height="8" rx="4" fill="#ffffff" opacity=".8"/>

  <!-- Word list rows -->
  <rect x="300" y="380" width="200" height="1" fill="#f0f0f0"/>
  <rect x="300" y="388" width="90" height="8" rx="4" fill="#0a0a0a" opacity=".7"/>
  <rect x="420" y="388" width="50" height="8" rx="4" fill="#b0b0b6" opacity=".5"/>
  <rect x="300" y="404" width="1" fill="#f0f0f0"/>
  <rect x="300" y="408" width="70" height="8" rx="4" fill="#0a0a0a" opacity=".5"/>
  <rect x="420" y="408" width="60" height="8" rx="4" fill="#b0b0b6" opacity=".4"/>
  <rect x="300" y="428" width="80" height="8" rx="4" fill="#0a0a0a" opacity=".4"/>
  <rect x="420" y="428" width="45" height="8" rx="4" fill="#b0b0b6" opacity=".3"/>

  <!-- Bottom nav -->
  <rect x="284" y="464" width="232" height="40" rx="0" fill="#f8f8f8"/>
  <rect x="284" y="504" width="232" height="20" rx="0" fill="#f8f8f8"/>
  <rect x="284" y="484" width="232" height="0.5" fill="#e8e8e8"/>
  <!-- Nav dots -->
  <circle cx="350" cy="484" r="4" fill="#0a0a0a" opacity=".8"/>
  <circle cx="400" cy="484" r="4" fill="#b0b0b6" opacity=".5"/>
  <circle cx="450" cy="484" r="4" fill="#b0b0b6" opacity=".5"/>

  <!-- Home indicator -->
  <rect x="356" y="516" width="88" height="5" rx="2.5" fill="#e0e0e0"/>

  <!-- Floating badge: Vokabellab icon enlarged -->
  <rect x="92" y="200" width="100" height="100" rx="24" fill="#0a0a0a" opacity=".04" stroke="#e0e0e4" stroke-width="1.5"/>
  <rect x="102" y="210" width="80" height="80" rx="18" fill="#0a0a0a"/>
  <text x="142" y="259" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle">V</text>

  <!-- Label -->
  <rect x="86" y="318" width="112" height="10" rx="5" fill="#b0b0b6" opacity=".4"/>
  <rect x="98" y="334" width="88" height="8" rx="4" fill="#b0b0b6" opacity=".3"/>

  <!-- Right floating element: stats -->
  <rect x="608" y="220" width="124" height="80" rx="16" fill="#ffffff" stroke="#e0e0e4" stroke-width="1.5"/>
  <rect x="624" y="236" width="50" height="8" rx="4" fill="#0a0a0a" opacity=".3"/>
  <rect x="624" y="252" width="70" height="14" rx="5" fill="#0a0a0a" opacity=".8"/>
  <rect x="624" y="274" width="40" height="8" rx="4" fill="#b0b0b6" opacity=".4"/>

  <rect x="608" y="316" width="124" height="80" rx="16" fill="#0a0a0a"/>
  <rect x="624" y="332" width="50" height="8" rx="4" fill="#b0b0b6" opacity=".5"/>
  <rect x="624" y="348" width="70" height="14" rx="5" fill="#ffffff" opacity=".9"/>
  <rect x="624" y="370" width="40" height="8" rx="4" fill="#b0b0b6" opacity=".4"/>
</svg>
