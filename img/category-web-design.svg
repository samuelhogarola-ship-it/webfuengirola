  <text x="150" y="292" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="850" letter-spacing="-.04em">Web clara y preparada</text>
  <rect x="150" y="318" width="328" height="13" rx="7" fill="#151515" opacity=".14"/>
