<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Ordenador con web clara para convertir</title>
  <desc id="desc">Un ordenador de sobremesa muestra una web clara de Web Fuengirola con jerarquía, llamada a la acción y bloques de confianza.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4efe5"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7ded1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f1eadf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#111111" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="620" rx="42" fill="url(#bg)"/>
  <circle cx="790" cy="92" r="155" fill="#0f172a" opacity=".06"/>
  <circle cx="152" cy="518" r="210" fill="#b7a58c" opacity=".18"/>

  <rect x="104" y="86" width="752" height="430" rx="34" fill="#151515" filter="url(#shadow)"/>
  <rect x="128" y="120" width="704" height="342" rx="20" fill="url(#screen)"/>
  <rect x="128" y="120" width="704" height="52" rx="20" fill="#202020"/>
  <circle cx="166" cy="146" r="7" fill="#fff" opacity=".36"/>
  <circle cx="191" cy="146" r="7" fill="#fff" opacity=".24"/>
  <circle cx="216" cy="146" r="7" fill="#fff" opacity=".15"/>
  <rect x="570" y="140" width="138" height="12" rx="6" fill="#fff" opacity=".18"/>
  <rect x="724" y="135" width="72" height="22" rx="11" fill="#fff" opacity=".9"/>

  <circle cx="180" cy="220" r="31" fill="#111"/>
  <text x="154" y="232" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">WF</text>
  <text x="232" y="218" fill="#111" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing=".11em">WEB FUENGIROLA</text>
  <text x="154" y="304" fill="#111" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="-.05em">Web clara</text>
  <text x="154" y="354" fill="#111" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="-.05em">lista para vender</text>
  <rect x="156" y="382" width="356" height="14" rx="7" fill="#111" opacity=".14"/>
  <rect x="156" y="407" width="270" height="14" rx="7" fill="#111" opacity=".1"/>
  <rect x="156" y="440" width="174" height="48" rx="24" fill="#111"/>
  <text x="193" y="470" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">Pedir presupuesto</text>

  <rect x="590" y="220" width="178" height="214" rx="28" fill="#fff" stroke="#111" stroke-opacity=".08"/>
  <rect x="616" y="250" width="86" height="12" rx="6" fill="#111" opacity=".22"/>
  <rect x="616" y="280" width="126" height="56" rx="18" fill="#eee5d9"/>
  <rect x="616" y="358" width="126" height="14" rx="7" fill="#111" opacity=".14"/>
  <rect x="616" y="384" width="86" height="14" rx="7" fill="#111" opacity=".09"/>
  <rect x="386" y="516" width="188" height="24" rx="12" fill="#151515"/>
  <rect x="296" y="548" width="368" height="22" rx="11" fill="#151515" opacity=".2"/>
</svg>
