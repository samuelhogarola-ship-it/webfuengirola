<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Visual de diseño web Web Fuengirola</title>
  <desc id="desc">Ordenador con una web clara, logo WF, llamada a la acción y módulos de contenido.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7dc"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f0e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#151515" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="620" rx="42" fill="url(#bg)"/>
  <circle cx="810" cy="88" r="150" fill="#171717" opacity=".06"/>
