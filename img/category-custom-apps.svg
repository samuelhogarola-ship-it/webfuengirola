<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Teléfono con app operativa</title>
  <desc id="desc">Un teléfono móvil muestra una app operativa de Web Fuengirola con tareas, estados, mensajes y acciones internas.</desc>
  <defs>
